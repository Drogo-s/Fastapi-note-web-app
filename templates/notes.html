<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Notes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="panel">
        <h2>My Notes</h2>
        {% if error %}
          <p style="color: red;">{{ error }}</p>
        {% endif %}
        <form method="post" action="/notes">
            <input type="text" name="title" placeholder="Note Title" required>
            <textarea name="content" id="noteContent" placeholder="Note content"></textarea>

            <!-- Voice Button -->
            <button type="button" id="voiceBtn" onclick="toggleVoice()" style="background-color: green; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px;">
                🎤 Start Speaking
            </button>
            <p id="voiceStatus" style="color: gray; font-size: 13px;"></p>

            <button type="submit" class="btn-primary">Add Note</button>
        </form>

        <h3 style="margin-top: 30px;">All Notes</h3>
        <ul>
            {% for note in notes %}
            <li>
                <span><strong>{{ note.title }}</strong> - {{ note.content }}</span>
                <form method="post" action="/notes/delete" style="display: inline;">
                    <input type="hidden" name="note_id" value="{{ note.id }}">
                    <button type="submit" class="btn-delete">Delete</button>
                </form>
            </li>
            {% endfor %}
        </ul>
        <p style="text-align: center; margin-top: 20px;">
            <a href="/logout"><button class="btn-logout">Logout</button></a>
        </p>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isListening = false;

        async function toggleVoice() {
            if (isListening) {
                stopVoice();
            } else {
                startVoice();
            }
        }

        async function startVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

            mediaRecorder.onstop = async () => {
                document.getElementById('voiceStatus').textContent = "Transcribing... please wait";
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const formData = new FormData();
                formData.append('file', audioBlob, 'recording.wav');

                const response = await fetch('/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.text) {
                    document.getElementById('noteContent').value += data.text;
                    document.getElementById('voiceStatus').textContent = "Done!";
                } else {
                    document.getElementById('voiceStatus').textContent = "Error: " + data.error;
                }
            };

            mediaRecorder.start();
            isListening = true;
            document.getElementById('voiceBtn').textContent = '🔴 Stop Speaking';
            document.getElementById('voiceBtn').style.backgroundColor = 'red';
            document.getElementById('voiceStatus').textContent = "Listening...";
        }

        function stopVoice() {
            mediaRecorder.stop();
            isListening = false;
            document.getElementById('voiceBtn').textContent = '🎤 Start Speaking';
            document.getElementById('voiceBtn').style.backgroundColor = 'green';
        }
    </script>
</body>
</html>
